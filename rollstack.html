<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShabzLabs - Shape Sorting Game</title>
  <style>
    /* New styles for the top-right link */
    .top-right-link {
      position: absolute;
      top: 20px;
      right: 20px;
      text-decoration: none;
      font-weight: bold;
      color: #2563eb;
      background: rgba(255, 255, 255, 0.7);
      padding: 8px 15px;
      border-radius: 12px;
      transition: background 0.3s ease;
      font-size: 0.9rem;
    }

    .top-right-link:hover {
      background: white;
      text-decoration: underline;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #dbeafe, #fef3c7);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative; /* Added to keep link relative to body */
    }

    .game-container {
      width: 90%;
      max-width: 700px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      padding: 30px;
      text-align: center;
    }

    .title {
      font-size: 2.3rem;
      color: #2563eb;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #374151;
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .score-box,
    .level-box {
      background: #eff6ff;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: bold;
      color: #1d4ed8;
    }

    .progress-wrapper {
      width: 100%;
      height: 18px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 15px 0 25px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #60a5fa, #facc15);
      transition: width 0.4s ease;
    }

    .shape-card {
      background: #f9fafb;
      border-radius: 22px;
      padding: 30px 20px;
      margin-bottom: 25px;
      border: 3px solid #e5e7eb;
    }

    .shape-emoji {
      font-size: 6rem;
      margin-bottom: 10px;
    }

    .shape-name {
      font-size: 2rem;
      color: #111827;
      margin: 10px 0 0;
    }

    .question {
      font-size: 1.2rem;
      margin: 20px 0;
      color: #374151;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    button.choice-btn,
    .restart-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 12px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button.choice-btn:hover,
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    button.choice-btn:active,
    .restart-btn:active {
      transform: translateY(0);
    }

    .rolls {
      background: #93c5fd;
      color: #0f172a;
    }

    .stacks {
      background: #fde68a;
      color: #0f172a;
    }

    .both {
      background: #86efac;
      color: #0f172a;
    }

    .feedback {
      min-height: 32px;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 10px;
    }

    .stars {
      font-size: 1.8rem;
      margin-top: 10px;
      min-height: 35px;
    }

    .restart-btn {
      background: #2563eb;
      color: white;
      margin-top: 18px;
      padding: 14px 24px;
      display: none;
    }

    @media (max-width: 600px) {
      .button-grid {
        grid-template-columns: 1fr;
      }

      .shape-emoji {
        font-size: 4.7rem;
      }

      .shape-name {
        font-size: 1.6rem;
      }
      
      .top-right-link {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="top-right-link">Shabzlabs</a>
  
  <div class="game-container">
    <h1 class="title">ShabzLabs</h1>
    <p class="subtitle">Shape Sorting Game</p>

    <div class="top-bar">
      <div class="level-box" id="levelText">Question 1 of 5</div>
      <div class="score-box" id="scoreText">Score: 0</div>
    </div>

    <div class="progress-wrapper">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="shape-card">
      <div class="shape-emoji" id="shapeEmoji">⚽</div>
      <h2 class="shape-name" id="shapeName">Ball</h2>
      <p class="question">What can this object do?</p>
    </div>

    <div class="button-grid">
      <button class="choice-btn rolls" onclick="checkAnswer('rolls')">Rolls</button>
      <button class="choice-btn stacks" onclick="checkAnswer('stacks')">Stacks</button>
      <button class="choice-btn both" onclick="checkAnswer('both')">Both</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars"></div>

    <button class="restart-btn" id="restartBtn" onclick="restartGame()">Play Again</button>
  </div>

  <script>
    const shapes = [
      { name: "Ball", emoji: "⚽", answer: "rolls" },
      { name: "Box", emoji: "📦", answer: "stacks" },
      { name: "Can", emoji: "🥫", answer: "both" },
      { name: "Dice", emoji: "🎲", answer: "stacks" },
      { name: "Orange", emoji: "🍊", answer: "rolls" }
    ];

    let currentShape = 0;
    let score = 0;
    let locked = false;

    function updateGame() {
      document.getElementById("shapeEmoji").textContent = shapes[currentShape].emoji;
      document.getElementById("shapeName").textContent = shapes[currentShape].name;
      document.getElementById("scoreText").textContent = "Score: " + score;
      document.getElementById("levelText").textContent =
        "Question " + (currentShape + 1) + " of " + shapes.length;
      document.getElementById("progressBar").style.width =
        (currentShape / shapes.length) * 100 + "%";
      document.getElementById("feedback").textContent = "";
      document.getElementById("stars").textContent = "";
    }

    function checkAnswer(choice) {
      if (locked) return;
      locked = true;

      const feedback = document.getElementById("feedback");
      const stars = document.getElementById("stars");

      if (choice === shapes[currentShape].answer) {
        feedback.textContent = "Correct!";
        feedback.style.color = "#16a34a";
        stars.textContent = "⭐";
        score++;
      } else {
        feedback.textContent = "Nice try!";
        feedback.style.color = "#dc2626";
        stars.textContent = "";
      }

      document.getElementById("scoreText").textContent = "Score: " + score;

      setTimeout(() => {
        currentShape++;

        if (currentShape < shapes.length) {
          updateGame();
          locked = false;
        } else {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      document.getElementById("shapeEmoji").textContent = "🎉";
      document.getElementById("shapeName").textContent = "Great Job!";
      document.getElementById("levelText").textContent = "Game Complete";
      document.getElementById("progressBar").style.width = "100%";

      const feedback = document.getElementById("feedback");
      feedback.style.color = "#2563eb";
      feedback.textContent = "Final Score: " + score + " / " + shapes.length;

      let starReward = "";
      if (score === shapes.length) {
        starReward = "⭐⭐⭐ Amazing!";
      } else if (score >= 3) {
        starReward = "⭐⭐ Great work!";
      } else {
        starReward = "⭐ Keep practicing!";
      }

      document.getElementById("stars").textContent = starReward;
      document.getElementById("restartBtn").style.display = "inline-block";
      locked = false;
    }

    function restartGame() {
      currentShape = 0;
      score = 0;
      locked = false;
      document.getElementById("restartBtn").style.display = "none";
      updateGame();
    }

    updateGame();
  </script>
</body>
</html>
