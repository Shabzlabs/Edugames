<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shape Hunter - Space Adventure</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background-color: #020617;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    #space-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    .shape-container {
      transition: all 0.2s ease;
      cursor: pointer;
      background-color: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .level-small {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .level-small .shape-container {
      max-width: 173px;
      width: 100%;
      justify-self: center;
    }

    .level-small svg {
      padding: 8px;
    }

    .shape-container:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .correct {
      border: 4px solid #22c55e !important;
      background-color: rgba(34, 197, 94, 0.2) !important;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
    }

    .incorrect {
      border: 4px solid #ef4444 !important;
      background-color: rgba(239, 68, 68, 0.2) !important;
      opacity: 0.6;
    }

    .glass-ui {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes pop-in {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .animate-pop-in {
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hidden {
      display: none;
    }

    svg {
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
    }

    @media (max-width: 640px) {
      body {
        padding-top: 0;
        padding-bottom: 0;
      }

      #hud {
        height: 100dvh;
        max-height: 100dvh;
        min-height: 100dvh;
        padding-top: 24px !important;
        padding-bottom: 8px !important;
        padding-left: 8px !important;
        padding-right: 8px !important;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        margin-bottom: 8px !important;
        flex-shrink: 0;
      }

      .mobile-title {
        font-size: 1.22rem !important;
        line-height: 1.35rem !important;
        margin-bottom: 6px !important;
      }

      #instruction-area {
        padding: 7px 10px !important;
        border-radius: 12px !important;
      }

      #instruction-area p {
        font-size: 0.82rem !important;
        line-height: 1rem !important;
      }

      #instruction-area span {
        font-size: 0.98rem !important;
      }

      .stats-bar {
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 4px !important;
        margin-bottom: 9px !important;
        padding: 7px 10px !important;
        border-radius: 12px !important;
        flex-shrink: 0;
      }

      .stats-left {
        justify-content: center !important;
        gap: 16px !important;
        width: 100%;
      }

      .stats-left div {
        font-size: 0.9rem !important;
        line-height: 1rem !important;
      }

      .mission-level {
        font-size: 0.62rem !important;
        line-height: 0.75rem !important;
        text-align: center !important;
        width: 100%;
      }

      #game-grid {
        flex: 1;
        min-height: 0 !important;
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        display: grid !important;
        gap: 7px !important;
        align-content: start;
        justify-content: center;
      }

      #game-grid.level-small {
        max-width: 330px !important;
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      }

      .level-small .shape-container {
        max-width: 100px !important;
        width: 100% !important;
        border-radius: 15px !important;
        justify-self: center;
      }

      #game-grid:not(.level-small) {
        max-width: 318px !important;
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      }

      #game-grid:not(.level-small) .shape-container {
        max-width: 72px !important;
        width: 100% !important;
        border-radius: 12px !important;
        justify-self: center;
      }

      .shape-container svg {
        padding: 4px !important;
      }

      .correct {
        border: 2px solid #22c55e !important;
      }

      .incorrect {
        border: 2px solid #ef4444 !important;
      }

      #start-overlay {
        padding: 16px !important;
      }

      #start-overlay .text-7xl {
        font-size: 3.2rem !important;
        margin-bottom: 12px !important;
      }

      #start-overlay h2,
      #victory-overlay h2 {
        font-size: 2rem !important;
        line-height: 2.2rem !important;
      }

      #start-overlay p {
        font-size: 0.95rem !important;
        margin-bottom: 20px !important;
      }

      #start-overlay button,
      #next-lvl-btn {
        font-size: 1rem !important;
        padding: 12px 24px !important;
      }

      #victory-overlay {
        padding: 14px !important;
      }

      #victory-overlay .text-8xl {
        font-size: 4rem !important;
        margin-bottom: 12px !important;
      }

      #victory-overlay .bg-black\/50 {
        padding: 18px !important;
        margin-bottom: 20px !important;
      }

      #final-score,
      #final-time {
        font-size: 2.3rem !important;
      }
    }
  </style>
</head>

<body class="min-h-screen">
  <canvas id="space-canvas"></canvas>

  <div id="hud" class="relative z-10 p-4 md:p-6 max-w-5xl mx-auto w-full transition-opacity duration-500">
    <header class="text-center mb-4">
      <h1 class="mobile-title text-5xl font-black text-white mb-3 drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]" id="game-title">
        Shape Hunter!
      </h1>

      <div id="instruction-area" class="glass-ui rounded-2xl p-3 inline-block max-w-full shadow-2xl">
        <p class="text-xl text-blue-100">
          Find the
          <span id="target-count-display" class="font-bold text-3xl text-yellow-400">3</span>
          <span id="target-shape-name" class="font-black text-3xl text-white underline capitalize">Loading...</span>
        </p>
      </div>
    </header>

    <div class="stats-bar flex flex-wrap justify-between items-center mb-5 glass-ui p-3 rounded-2xl gap-3">
      <div class="stats-left flex flex-wrap gap-8 items-center">
        <div class="text-xl font-bold">
          Score: <span id="score" class="text-yellow-400">0</span>
        </div>

        <div class="text-xl font-bold text-blue-300">
          Time: <span id="timer">0.0</span>s
        </div>
      </div>

      <div class="mission-level text-xs font-bold text-gray-400 uppercase tracking-widest">
        Mission Level: <span id="current-level-display" class="text-indigo-400">1</span>
      </div>
    </div>

    <div id="game-grid" class="level-small grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>

    <div id="start-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-md flex flex-col items-center justify-center z-[60] p-6 text-center">
      <div class="text-7xl mb-6">🛰️</div>

      <h2 class="text-6xl font-black text-white mb-4">
        Space Shape Mission
      </h2>

      <p class="text-xl text-blue-200 mb-10 max-w-md">
        Help the spaceship find the hidden shapes and travel through the warp zones!
      </p>

      <button onclick="startGame(1)" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-5 rounded-full font-black transition-all shadow-[0_0_30px_rgba(79,70,229,0.6)] text-2xl transform hover:scale-110 active:scale-95">
        START MISSION
      </button>
    </div>

    <div id="victory-overlay" class="hidden fixed inset-0 bg-indigo-900/40 backdrop-blur-xl flex flex-col items-center justify-center z-[70] p-6 text-center text-white animate-pop-in">
      <div class="text-8xl mb-6">🚀</div>

      <h2 class="text-5xl font-black mb-4" id="victory-title">
        Mission Complete!
      </h2>

      <div class="bg-black/50 border border-white/20 rounded-3xl p-8 mb-10 w-full max-w-md flex justify-around shadow-2xl">
        <div>
          <p class="text-xs uppercase font-bold opacity-70 mb-1">Score</p>
          <p id="final-score" class="text-5xl font-black text-yellow-400">0</p>
        </div>

        <div class="w-px bg-white/20"></div>

        <div>
          <p class="text-xs uppercase font-bold opacity-70 mb-1">Time</p>
          <p id="final-time" class="text-5xl font-black text-blue-400">0.0s</p>
        </div>
      </div>

      <button id="next-lvl-btn" class="bg-white text-indigo-900 py-5 px-14 rounded-full font-black transition-all shadow-2xl text-xl hover:bg-yellow-400 transform hover:scale-105">
        Next Mission
      </button>
    </div>
  </div>

  <script>
    const AudioEngine = {
      ctx: null,

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      },

      playCorrect() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.2);
      },

      playIncorrect() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.15);

        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
      },

      playLevelUp() {
        this.init();
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime + (i * 0.1));
          gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + (i * 0.1) + 0.3);

          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(this.ctx.currentTime + (i * 0.1));
          osc.stop(this.ctx.currentTime + (i * 0.1) + 0.3);
        });
      },

      playWarp() {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(50, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(2000, this.ctx.currentTime + 2.5);

        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 1);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 3);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 3);
      }
    };

    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');

    let stars = [];
    let isWarping = false;
    let warpFactor = 1;

    const STAR_COUNT = 450;

    function initSpace() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];

      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          z: Math.random() * canvas.width,
          size: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 0.5 + 0.1,
          color: `rgba(${180 + Math.random() * 75}, ${200 + Math.random() * 55}, 255, ${0.4 + Math.random() * 0.6})`
        });
      }
    }

    function animateSpace() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      ctx.fillStyle = isWarping ? 'rgba(2, 6, 23, 0.2)' : '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (isWarping) {
        warpFactor = Math.min(warpFactor + 0.6, 50);
      } else {
        warpFactor = Math.max(warpFactor - 0.4, 1);
      }

      stars.forEach(star => {
        if (!isWarping && warpFactor < 2) {
          star.y += star.speed;

          if (star.y > canvas.height) star.y = 0;

          ctx.fillStyle = star.color;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          star.z -= warpFactor;

          if (star.z <= 0) {
            star.z = canvas.width;
            star.x = Math.random() * canvas.width;
            star.y = Math.random() * canvas.height;
          }

          const k = 128 / star.z;
          const px = (star.x - cx) * k + cx;
          const py = (star.y - cy) * k + cy;

          if (px > 0 && px < canvas.width && py > 0 && py < canvas.height) {
            const size = (1 - star.z / canvas.width) * 3;
            const stretch = isWarping ? warpFactor * 0.7 : 1;

            ctx.strokeStyle = star.color;
            ctx.lineWidth = size;

            ctx.beginPath();
            ctx.moveTo(px, py);

            const tailX = (star.x - cx) * (128 / (star.z + stretch)) + cx;
            const tailY = (star.y - cy) * (128 / (star.z + stretch)) + cy;

            ctx.lineTo(tailX, tailY);
            ctx.stroke();
          }
        }
      });

      requestAnimationFrame(animateSpace);
    }

    async function triggerWarpEffect() {
      return new Promise((resolve) => {
        isWarping = true;
        AudioEngine.playWarp();
        document.getElementById('hud').style.opacity = '0';

        setTimeout(() => {
          isWarping = false;

          setTimeout(() => {
            document.getElementById('hud').style.opacity = '1';
            resolve();
          }, 800);
        }, 2500);
      });
    }

    window.addEventListener('resize', initSpace);
    initSpace();
    animateSpace();

    const gameGrid = document.getElementById('game-grid');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const targetText = document.getElementById('target-shape-name');
    const targetCountText = document.getElementById('target-count-display');
    const levelDisplay = document.getElementById('current-level-display');
    const startOverlay = document.getElementById('start-overlay');
    const victoryOverlay = document.getElementById('victory-overlay');

    let currentLevel = 1;
    let score = 0;
    let targetsFound = 0;
    let sequenceIndex = 0;
    let startTime = 0;
    let timerInterval = null;
    let gameActive = false;

    const colors = ['#f87171', '#60a5fa', '#fbbf24', '#34d399', '#a78bfa'];
    const hardColors = ['#f87171', '#60a5fa', '#fbbf24', '#34d399', '#a78bfa', '#f472b6', '#22d3ee', '#fb923c', '#94a3b8', '#c084fc'];

    const pool2D = [
      'triangle',
      'square',
      'rectangle',
      'trapezoid',
      'rhombus',
      'pentagon',
      'hexagon',
      'octagon'
    ];

    const pool3D = [
      'sphere',
      'cube',
      'cylinder',
      'cone',
      'rectangular prism',
      'triangular prism',
      'square-based pyramid'
    ];

    const levelData = {
      1: {
        title: "Level 1: Basic Shapes",
        gridSize: 8,
        targetCount: 3,
        order: ['triangle', 'square', 'rectangle', 'trapezoid', 'rhombus', 'pentagon', 'hexagon', 'octagon'],
        pool: pool2D
      },

      2: {
        title: "Level 2: 3D Solids",
        gridSize: 8,
        targetCount: 3,
        order: ['sphere', 'cube', 'cylinder', 'cone', 'rectangular prism', 'triangular prism', 'square-based pyramid'],
        pool: pool3D
      },

      3: {
        title: "Level 3: Master Challenge",
        gridSize: 12,
        targetCount: 4,
        order: ['octagon', 'sphere', 'rhombus', 'cylinder', 'trapezoid', 'triangular prism', 'square-based pyramid'],
        pool: [...pool2D, ...pool3D]
      },

      4: {
        title: "Level 4: Super Speed!",
        gridSize: 18,
        mobileGridSize: 16,
        targetCount: 5,
        order: ['hexagon', 'cone', 'rhombus', 'cube', 'octagon', 'rectangular prism', 'square-based pyramid'],
        pool: [...pool2D, ...pool3D]
      }
    };

    const draw = {
      triangle: () => "50,15 85,85 15,85",
      square: () => "20,20 80,20 80,80 20,80",
      rhombus: () => "50,10 80,50 50,90 20,50",
      rectangle: () => "15,30 85,30 85,70 15,70",
      pentagon: () => "50,10 90,40 75,90 25,90 10,40",
      hexagon: () => "25,15 75,15 95,50 75,85 25,85 5,50",
      octagon: () => "30,15 70,15 90,35 90,65 70,85 30,85 10,65 10,35",
      trapezoid: () => "25,30 75,30 95,70 5,70",

      sphere: (c) => {
        const id = "grad-" + Math.random().toString(36).substr(2, 5);
        return `
          <defs>
            <radialGradient id="${id}" cx="35%" cy="35%" r="50%" fx="35%" fy="35%">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
              <stop offset="40%" stop-color="${c}"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="40" fill="url(#${id})" stroke="rgba(255,255,255,0.2)"/>
        `;
      },

      cube: (c) => `
        <path d="M25,70 L25,30 L65,30 L65,70 Z" fill="${c}" stroke="#fff" stroke-width="1.5"/>
        <path d="M25,30 L40,15 L80,15 L65,30 Z" fill="${c}" opacity="0.8" stroke="#fff" stroke-width="1.5"/>
        <path d="M65,30 L80,15 L80,55 L65,70 Z" fill="${c}" opacity="0.6" stroke="#fff" stroke-width="1.5"/>
      `,

      cylinder: (c) => `
        <ellipse cx="50" cy="25" rx="30" ry="10" fill="${c}" opacity="0.8" stroke="#fff" stroke-width="1.5"/>
        <rect x="20" y="25" width="60" height="50" fill="${c}"/>
        <line x1="20" y1="25" x2="20" y2="75" stroke="#fff"/>
        <line x1="80" y1="25" x2="80" y2="75" stroke="#fff"/>
        <ellipse cx="50" cy="75" rx="30" ry="10" fill="${c}" stroke="#fff" stroke-width="1.5"/>
      `,

      cone: (c) => `
        <path d="M50,15 L20,75 L80,75 Z" fill="${c}" stroke="#fff"/>
        <ellipse cx="50" cy="75" rx="30" ry="10" fill="${c}" opacity="0.7" stroke="#fff"/>
      `,

      'rectangular prism': (c) => `
        <path d="M15,45 L65,45 L65,75 L15,75 Z" fill="${c}" stroke="#fff"/>
        <path d="M15,45 L35,25 L85,25 L65,45 Z" fill="${c}" opacity="0.8" stroke="#fff"/>
        <path d="M65,45 L85,25 L85,55 L65,75 Z" fill="${c}" opacity="0.6" stroke="#fff"/>
      `,

      'triangular prism': (c) => `
        <path d="M70,25 L55,75 L95,75 Z" fill="${c}" stroke="#fff" stroke-width="2"/>
        <path d="M70,25 L25,15 L10,65 L55,75 Z" fill="${c}" opacity="0.7" stroke="#fff" stroke-width="1.5"/>
        <path d="M70,25 L25,15" stroke="#fff"/>
        <path d="M55,75 L10,65" stroke="#fff"/>
      `,

      'square-based pyramid': (c) => `
        <path d="M50,15 L15,70 L75,70 Z" fill="${c}" stroke="#fff" stroke-width="1.5"/>
        <path d="M50,15 L75,70 L95,55 Z" fill="${c}" opacity="0.7" stroke="#fff" stroke-width="1.5"/>
        <path d="M15,70 L75,70 L95,55 L35,55 Z" fill="${c}" opacity="0.5" stroke="#fff" stroke-width="1.5"/>
      `
    };

    function getShapeSVG(type, color, rotation = 0) {
      const rotateStr = rotation !== 0 ? `transform="rotate(${rotation} 50 50)"` : '';

      if (pool2D.includes(type)) {
        return `
          <svg viewBox="0 0 100 100" class="w-full h-full p-2">
            <polygon points="${draw[type]()}" fill="${color}" stroke="#fff" stroke-width="2" ${rotateStr} />
          </svg>
        `;
      } else {
        return `
          <svg viewBox="0 0 100 100" class="w-full h-full p-2">
            <g ${rotateStr}>
              ${draw[type](color)}
            </g>
          </svg>
        `;
      }
    }

    function isMobileScreen() {
      return window.matchMedia("(max-width: 640px)").matches;
    }

    async function startGame(lvl) {
      AudioEngine.init();

      if (lvl > 1) {
        victoryOverlay.classList.add('hidden');
        await triggerWarpEffect();
      }

      currentLevel = lvl;
      levelDisplay.textContent = lvl;
      score = (lvl === 1) ? 0 : score;
      sequenceIndex = 0;
      scoreDisplay.textContent = score;
      startTime = Date.now();

      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        timerDisplay.textContent = ((Date.now() - startTime) / 1000).toFixed(1);
      }, 100);

      startOverlay.classList.add('hidden');
      victoryOverlay.classList.add('hidden');
      document.getElementById('game-title').textContent = levelData[lvl].title;

      spawnLevel();
    }

    function spawnLevel() {
      gameGrid.innerHTML = '';
      targetsFound = 0;
      gameActive = true;

      const data = levelData[currentLevel];
      const currentTarget = data.order[sequenceIndex];

      let displayGridSize = data.gridSize;

      if (isMobileScreen() && currentLevel <= 2) {
        displayGridSize = 9;
      }

      if (isMobileScreen() && currentLevel === 4) {
        displayGridSize = data.mobileGridSize;
      }

      targetText.textContent = currentTarget + (currentTarget.endsWith('us') ? 'es' : 's');
      targetCountText.textContent = data.targetCount;

      if (currentLevel <= 3) {
        gameGrid.className = `level-small grid grid-cols-2 sm:grid-cols-3 ${displayGridSize > 8 ? 'md:grid-cols-6' : 'md:grid-cols-4'} gap-3`;
      } else {
        gameGrid.className = `grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4`;
      }

      let pool = data.pool.filter(s => s !== currentTarget);
      let items = [];

      for (let i = 0; i < data.targetCount; i++) {
        items.push(currentTarget);
      }

      while (items.length < displayGridSize) {
        items.push(pool[Math.floor(Math.random() * pool.length)]);
      }

      items.sort(() => 0.5 - Math.random());

      const colorSet = currentLevel >= 3 ? hardColors : colors;

      items.forEach((type) => {
        const card = document.createElement('div');
        card.className = "shape-container rounded-3xl animate-pop-in";

        const rotation = (currentLevel === 4 && Math.random() > 0.5) ? 45 : 0;

        card.innerHTML = getShapeSVG(
          type,
          colorSet[Math.floor(Math.random() * colorSet.length)],
          rotation
        );

        card.onclick = () => {
          if (!gameActive || card.dataset.done) return;

          if (type === currentTarget) {
            AudioEngine.playCorrect();
            card.dataset.done = "true";
            card.classList.add('correct');

            score += (10 * currentLevel);
            targetsFound++;

            if (targetsFound >= data.targetCount) {
              gameActive = false;

              setTimeout(() => {
                sequenceIndex++;

                if (sequenceIndex >= data.order.length) {
                  showVictory();
                } else {
                  spawnLevel();
                }
              }, 400);
            }
          } else {
            AudioEngine.playIncorrect();
            card.classList.add('incorrect');
            score = Math.max(0, score - 5);
          }

          scoreDisplay.textContent = score;
        };

        gameGrid.appendChild(card);
      });
    }

    function showVictory() {
      AudioEngine.playLevelUp();
      clearInterval(timerInterval);
      victoryOverlay.classList.remove('hidden');

      document.getElementById('final-score').textContent = score;
      document.getElementById('final-time').textContent = timerDisplay.textContent + "s";

      const nextBtn = document.getElementById('next-lvl-btn');

      if (currentLevel < 4) {
        nextBtn.textContent = "Enter Warp Zone";
        nextBtn.onclick = () => startGame(currentLevel + 1);
      } else {
        nextBtn.textContent = "Restart Mission";
        nextBtn.onclick = () => startGame(1);
      }
    }
  </script>
</body>
</html>
